name: CI/CD VPS Deploy

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_PATH: /var/www/momento.sardarit.cloud
  PHP_VERSION: '8.3'
  NODE_VERSION: '22'

jobs:
  ci:
    name: CI Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none
          extensions: mbstring, bcmath, pdo_mysql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Build assets and cache
        run: |
          npm run build
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref_name == 'main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none
          extensions: mbstring, bcmath, pdo_mysql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Prepare environment and build assets
        run: |
          cp .env.example .env
          php artisan key:generate --force
          npm run build

      - name: Create deployment archive
        run: |
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.env' \
              --exclude='storage/logs' \
              --exclude='storage/framework/cache' \
              --exclude='storage/framework/sessions' \
              --exclude='storage/framework/views' \
              -czf /tmp/deploy.tar.gz \
              app bootstrap config database public resources routes storage vendor \
              artisan composer.json composer.lock package.json package-lock.json .env.example

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Stream archive to VPS via SSH pipe
        run: |
          cat /tmp/deploy.tar.gz | ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cat > /tmp/deploy.tar.gz"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_PATH: ${{ env.APP_PATH }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          WEB_USER: ${{ secrets.WEB_USER }}
          WEB_GROUP: ${{ secrets.WEB_GROUP }}
          PHP_FPM_SERVICE: ${{ secrets.PHP_FPM_SERVICE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: APP_PATH,APP_ENV_FILE,WEB_USER,WEB_GROUP,PHP_FPM_SERVICE
          script_stop: true
          script: |
            set -euo pipefail

            WEB_USER="${WEB_USER:-nginx}"
            WEB_GROUP="${WEB_GROUP:-nginx}"

            sudo mkdir -p "$APP_PATH"
            sudo chown -R "$USER":"$USER" "$APP_PATH"

            tar -xzf /tmp/deploy.tar.gz -C "$APP_PATH"
            rm -f /tmp/deploy.tar.gz

            cd "$APP_PATH"

            if [ ! -f .env ] && [ -n "${APP_ENV_FILE:-}" ]; then
              printf '%s' "$APP_ENV_FILE" > .env
            fi

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            if ! grep -q '^APP_KEY=base64:' .env; then
              php artisan key:generate --force
            fi

            php artisan storage:link || true
            php artisan migrate --force

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache || true

            sudo chgrp -R "$WEB_GROUP" storage bootstrap/cache
            sudo chmod -R ug+rwx storage bootstrap/cache
            sudo find storage bootstrap/cache -type d -exec chmod 775 {} \;
            sudo find storage bootstrap/cache -type f -exec chmod 664 {} \;

            if command -v setfacl >/dev/null 2>&1; then
              sudo setfacl -R -m u:"$WEB_USER":rwx -m u:"$USER":rwx storage bootstrap/cache
              sudo setfacl -dR -m u:"$WEB_USER":rwx -m u:"$USER":rwx storage bootstrap/cache
            fi

            if [ -n "${PHP_FPM_SERVICE:-}" ]; then
              sudo systemctl reload "$PHP_FPM_SERVICE"
            fi

            sudo systemctl reload nginx