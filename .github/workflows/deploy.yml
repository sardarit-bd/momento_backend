name: Deploy Laravel to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Deploy via SSH (appleboy/ssh-action) ────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/u395498717/domains/plum-koala-349902.hostingersite.com/public_html"

            cd "$APP_DIR"

            echo "→ Pulling latest changes..."
            git pull origin main

            echo "→ Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --ignore-platform-req=ext-sodium

            echo "→ Setting directory & file permissions..."
            find . -type f ! -path './.git/*' -exec chmod 644 {} \;
            find . -type d ! -path './.git/*' -exec chmod 755 {} \;

            echo "→ Setting storage & bootstrap/cache permissions..."
            chmod -R 775 storage bootstrap/cache
            chown -R $USER:$USER storage bootstrap/cache 2>/dev/null || true

            echo "→ Creating storage symlink (if not exists)..."
            php artisan storage:link --force 2>/dev/null || true

            echo "→ Clearing & rebuilding caches..."
            php artisan config:clear
            php artisan route:clear
            php artisan event:clear

            php artisan config:cache
            php artisan route:cache
            php artisan event:cache

            echo "→ Optimizing class loader..."
            php artisan optimize

            echo "✓ Deployment complete."