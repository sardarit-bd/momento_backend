name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  APP_PATH: /var/www/momento.sardarit.cloud
  PHP_VERSION: '8.3'
  NODE_VERSION: '22'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          extensions: mbstring, bcmath, pdo_mysql

      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 4. Install deps & build (ONLY ONCE)
      - name: Install & Build
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run build

      # 5. Create archive
      - name: Archive
        run: |
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.env' \
              -czf deploy.tar.gz .

      # 6. Upload to VPS
      - name: Upload to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key

          scp -i ~/.ssh/key -o StrictHostKeyChecking=no \
            deploy.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

      # 7. Deploy
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_PATH="${{ env.APP_PATH }}"

            mkdir -p $APP_PATH
            cd $APP_PATH

            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # env setup
            if [ ! -f .env ]; then
              echo "${{ secrets.APP_ENV_FILE }}" > .env
            fi

            # Laravel setup
            php artisan key:generate --force || true
            php artisan migrate --force

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            php artisan storage:link || true

            # permissions
            chmod -R 775 storage bootstrap/cache

            # reload services
            sudo systemctl reload php8.3-fpm || true
            sudo systemctl reload nginx || true